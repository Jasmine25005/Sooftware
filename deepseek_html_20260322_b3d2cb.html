<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SE Revision Quiz | Software Engineering Interactive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c10;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
            color: #eef2ff;
        }

        /* main container */
        .quiz-container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 260px 1fr 300px;
            gap: 20px;
            background: #0f1117;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.6);
        }

        /* ========= LEFT PANEL (Stats + Categories) ========= */
        .stats-panel {
            background: #11141c;
            padding: 24px 16px;
            border-right: 1px solid #23272f;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .stats-card {
            background: #1a1f2a;
            border-radius: 24px;
            padding: 20px 16px;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .stats-card h3 {
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b92b0;
            margin-bottom: 16px;
        }

        .stats-numbers {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 8px;
        }

        .stat-item {
            flex: 1;
            background: #0f1119;
            border-radius: 20px;
            padding: 12px 4px;
        }

        .stat-label {
            font-size: 13px;
            color: #7e84a3;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: white;
            line-height: 1.2;
        }

        .percentage {
            margin-top: 16px;
            background: #0a0c14;
            border-radius: 40px;
            padding: 12px;
        }

        .percentage .stat-label {
            font-size: 13px;
        }

        .percentage .stat-value {
            font-size: 28px;
            color: #6ee7b7;
        }

        .category-filter {
            margin-top: 8px;
        }

        .category-filter h4 {
            font-size: 14px;
            margin-bottom: 14px;
            color: #b9c0df;
            font-weight: 500;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btn {
            background: #1a1f2c;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #ccd6f6;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 2px 8px rgba(59,130,246,0.3);
        }

        .filter-btn:hover:not(.active) {
            background: #2d3343;
        }

        /* ========= MIDDLE PANEL (Lecture + Question) ========= */
        .quiz-main {
            background: #0f1117;
            padding: 28px 28px 32px;
            display: flex;
            flex-direction: column;
        }

        .lecture-header {
            border-bottom: 1px solid #252a35;
            padding-bottom: 18px;
            margin-bottom: 28px;
        }

        .lecture-badge {
            background: #1e293b;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #94a3f0;
        }

        .question-area {
            flex: 1;
        }

        .question-text {
            font-size: 1.65rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 32px;
            color: #f1f5ff;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 48px;
        }

        .option {
            background: #161c27;
            border-radius: 20px;
            padding: 14px 20px;
            border: 1px solid #2a2f3c;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            color: #e2e8ff;
        }

        .option:hover {
            background: #1f2736;
            border-color: #4b556b;
        }

        .option.disabled-opt {
            pointer-events: none;
            opacity: 0.7;
        }

        .option.correct-highlight {
            background: #0f3b2c;
            border-color: #2ecc71;
            color: #c6f7e5;
        }

        .option.wrong-highlight {
            background: #3b1e2a;
            border-color: #f87171;
            color: #ffe0e0;
        }

        .nav-buttons {
            display: flex;
            gap: 18px;
            margin-top: 20px;
        }

        .nav-btn {
            background: #1f2937;
            border: none;
            padding: 12px 28px;
            border-radius: 44px;
            font-weight: 600;
            font-size: 14px;
            color: #eef2ff;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-btn:hover {
            background: #2d3a4e;
        }

        /* ========= RIGHT PANEL (All Questions) ========= */
        .all-questions-panel {
            background: #0c0f17;
            border-left: 1px solid #23272f;
            padding: 24px 12px;
            overflow-y: auto;
            max-height: 85vh;
        }

        .all-questions-panel h3 {
            font-size: 18px;
            margin-bottom: 20px;
            padding-left: 8px;
            font-weight: 600;
        }

        .questions-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .q-item {
            background: #141925;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }

        .q-item:hover {
            background: #1f2538;
            border-color: #3b4259;
        }

        .q-item.active-question {
            background: #2c3e66;
            border-color: #3b82f6;
            color: white;
        }

        .q-status {
            width: 24px;
            height: 24px;
            border-radius: 30px;
            background: #232838;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .q-status.correct-dot {
            background: #2ecc71;
            color: #000;
        }

        .q-status.wrong-dot {
            background: #f97316;
            color: white;
        }

        .footer-note {
            margin-top: 24px;
            text-align: center;
            font-size: 11px;
            color: #5b6380;
        }

        @media (max-width: 1000px) {
            .quiz-container {
                grid-template-columns: 1fr;
            }
            .stats-panel, .all-questions-panel {
                border: none;
            }
        }
    </style>
</head>

        { id:110, text:"shows object classes and associations.", options:["Sequence","Use case","Activity","Class diagram"], correct:3, category:"Modeling" },
        { id:111, text:"shows activities involved in data processing.", options:["Sequence","Use case","Activity","Class"], correct:2, category:"Modeling" },
        { id:112, text:"reveals how system is used in broader business processes.", options:["Process model","State model","Interaction model","All"], correct:0, category:"Modeling" },
        { id:113, text:"shows dynamic behavior and how system responds to events.", options:["Structural","Behavioral","Interaction","All"], correct:1, category:"Modeling" },
        { id:114, text:"presents system and relationship with other systems.", options:["Class diagram","Activity","Sequence","Context diagram"], correct:3, category:"Modeling" },
        { id:115, text:"Which is static model?", options:["Structural","Behavioral","All","Both"], correct:0, category:"Modeling" },
        { id:116, text:"State machine model focuses on", options:["Data flow","Sequence of interactions","System states and transitions","Object hierarchies"], correct:2, category:"Modeling" },
        { id:117, text:"Which diagram useful for modeling functional requirements from user perspective?", options:["Class","Use case","Activity","Sequence"], correct:1, category:"Modeling" },
        { id:118, text:"Vertical lifeline in sequence diagram represents", options:["Time progression","Message priority","Processing time","Architecture layers"], correct:0, category:"Modeling" },
        { id:119, text:"Best for modeling logic of business processes?", options:["Sequence","Activity","State machine","Class"], correct:1, category:"Modeling" },
        { id:120, text:"Which diagram focuses on system boundary without internal detail?", options:["Context model","Sequence","Class","Activity"], correct:0, category:"Modeling" },
        { id:121, text:"Primary output of architectural design process?", options:["Code documentation","Test cases","Architectural model with components","Deployment script"], correct:2, category:"General" },
        { id:122, text:"Which Agile methodology uses pair programming?", options:["Scrum","Kanban","Extreme Programming (XP)","Waterfall"], correct:2, category:"Agile" },
        { id:123, text:"In V-model, which phase is paired with system testing?", options:["Requirements","Architectural design","System design","Module design"], correct:2, category:"V-Model" },
        { id:124, text:"What is the main advantage of iterative development?", options:["Early delivery of subset","Less testing","No planning","Avoids documentation"], correct:0, category:"Process Models" }
    ];

    // ----- state management
    let userAnswers = new Array(QUESTIONS.length).fill(null); // stores selected option index
    let answerStatus = new Array(QUESTIONS.length).fill(false); // true if answered
    let currentIndex = 0;
    let activeCategory = "All";

    function computeStats() {
        let correct = 0;
        for(let i=0; i<QUESTIONS.length; i++) {
            if(answerStatus[i] && userAnswers[i] === QUESTIONS[i].correct) correct++;
        }
        let wrong = answerStatus.filter((v,i)=> v && userAnswers[i] !== QUESTIONS[i].correct).length;
        let percentage = answerStatus.length ? Math.round((correct / answerStatus.filter(v=>v).length)*100) : 0;
        if(isNaN(percentage)) percentage = 0;
        return { correct, wrong, answered: answerStatus.filter(v=>v).length, percentage };
    }

    function renderAll() {
        const stats = computeStats();
        const filtered = activeCategory === "All" ? QUESTIONS : QUESTIONS.filter(q => q.category === activeCategory);
        const mainQuestion = QUESTIONS[currentIndex];
        const currentAnswered = answerStatus[currentIndex];
        const selectedOpt = userAnswers[currentIndex];
        
        const leftHtml = `
            <div class="stats-panel">
                <div class="stats-card">
                    <h3>📊 QUIZ PROGRESS</h3>
                    <div class="stats-numbers">
                        <div class="stat-item"><div class="stat-label">✅ Correct</div><div class="stat-value">${stats.correct}</div></div>
                        <div class="stat-item"><div class="stat-label">❌ Wrong</div><div class="stat-value">${stats.wrong}</div></div>
                    </div>
                    <div class="percentage"><div class="stat-label">📈 Percentage</div><div class="stat-value">${stats.percentage}%</div></div>
                </div>
                <div class="category-filter"><h4>📁 Filter by Topic</h4><div class="filter-buttons" id="filterButtons"></div></div>
            </div>
        `;
        const uniqueCats = ["All", ...new Set(QUESTIONS.map(q=>q.category))];
        const filterBtnsHtml = uniqueCats.map(cat => `<button class="filter-btn ${activeCategory===cat?'active':''}" data-cat="${cat}">${cat}</button>`).join('');
        
        const middleHtml = `
            <div class="quiz-main">
                <div class="lecture-header"><span class="lecture-badge">📘 Lecture: Software Engineering (SE Revision)</span></div>
                <div class="question-area"><div class="question-text">${mainQuestion.text}</div>
                <div class="options-list" id="optionsContainer"></div></div>
                <div class="nav-buttons"><button class="nav-btn" id="prevBtn">◀ Previous</button><button class="nav-btn" id="nextBtn">Next ▶</button></div>
            </div>
        `;
        
        const rightHtml = `
            <div class="all-questions-panel"><h3>📋 All Questions (${QUESTIONS.length})</h3><div class="questions-grid" id="questionsGrid"></div><div class="footer-note">Click any to jump</div></div>
        `;
        
        document.getElementById("quizRoot").innerHTML = leftHtml + middleHtml + rightHtml;
        document.getElementById("filterButtons").innerHTML = filterBtnsHtml;
        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", (e) => { activeCategory = btn.dataset.cat; renderAll(); });
        });
        
        // render options
        const optsDiv = document.getElementById("optionsContainer");
        optsDiv.innerHTML = mainQuestion.options.map((opt, idx) => {
            let extraClass = "";
            if(currentAnswered) {
                if(idx === mainQuestion.correct) extraClass = "correct-highlight";
                else if(idx === selectedOpt && selectedOpt !== mainQuestion.correct) extraClass = "wrong-highlight";
            }
            return `<div class="option ${extraClass} ${currentAnswered ? 'disabled-opt' : ''}" data-opt-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</div>`;
        }).join('');
        if(!currentAnswered) {
            document.querySelectorAll(".option").forEach(optDiv => {
                optDiv.addEventListener("click", (e) => {
                    if(answerStatus[currentIndex]) return;
                    const chosen = parseInt(optDiv.dataset.optIndex);
                    userAnswers[currentIndex] = chosen;
                    answerStatus[currentIndex] = true;
                    renderAll();
                });
            });
        }
        // grid
        const gridDiv = document.getElementById("questionsGrid");
        gridDiv.innerHTML = QUESTIONS.map((q, idx) => {
            let statusIcon = "";
            if(answerStatus[idx]) {
                let isCorrect = (userAnswers[idx] === q.correct);
                statusIcon = `<span class="q-status ${isCorrect ? 'correct-dot' : 'wrong-dot'}">${isCorrect ? '✓' : '✗'}</span>`;
            } else statusIcon = `<span class="q-status">?</span>`;
            return `<div class="q-item ${idx===currentIndex ? 'active-question' : ''}" data-qidx="${idx}"><span>Q${idx+1}. ${q.text.substring(0,45)}${q.text.length>45?'…':''}</span>${statusIcon}</div>`;
        }).join('');
        document.querySelectorAll(".q-item").forEach(el => {
            el.addEventListener("click", (e) => { currentIndex = parseInt(el.dataset.qidx); renderAll(); });
        });
        document.getElementById("prevBtn").addEventListener("click", () => { if(currentIndex>0) { currentIndex--; renderAll(); } });
        document.getElementById("nextBtn").addEventListener("click", () => { if(currentIndex<QUESTIONS.length-1) { currentIndex++; renderAll(); } });
    }
    renderAll();
</script>
</body>
</html>
